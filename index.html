<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-title" content="APGsG">
    <meta name="application-name" content="APGsG">
    <title>APGsG Gaming Community — Найди свою команду</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* все стили без изменений – такие же, как в предыдущем ответе */
    </style>
</head>
<body>
    <!-- вся вёрстка без изменений – такая же, как в предыдущем ответе -->

    <script>
        (function() {
            const CONFIG = {
                CLIENT_ID: '911925216421236776',
                REDIRECT_URI: 'https://search.apgsg.ru/',
                API_BASE_URL: 'https://441940.site.bot-hosting.cloud',
                FEEDBACK_WEBHOOK_URL: '',
                ADMIN_IDS: ['1033615399763320862', '665566492158590976']
            };

            const API = {
                statistics: `${CONFIG.API_BASE_URL}/MARAZMUS?question=getStatistics`,
                roles: `${CONFIG.API_BASE_URL}/MARAZMUS?question=SendRoles`,
                addRoles: `${CONFIG.API_BASE_URL}/MARAZMUS?question=addRoles`,
                authorize: `${CONFIG.API_BASE_URL}/MARAZMUS?question=authorize`,
                getReviews: `${CONFIG.API_BASE_URL}/MARAZMUS?question=getReviews`,
                sendReview: `${CONFIG.API_BASE_URL}/MARAZMUS?question=sendReview`,
                deleteReview: `${CONFIG.API_BASE_URL}/MARAZMUS?question=deleteReview`,
                rateReview: `${CONFIG.API_BASE_URL}/MARAZMUS?question=rateReview`
            };

            let currentUser = null;
            let token = null;
            let discordCode = null;
            let gamesList = [];
            let selectedGames = new Set();
            let comments = [];

            function extractField(obj, possibleNames) {
                if (!obj || typeof obj !== 'object') return null;
                for (const name of possibleNames) {
                    if (obj[name] !== undefined) return obj[name];
                    const lowerName = name.toLowerCase();
                    for (const key in obj) {
                        if (key.toLowerCase() === lowerName) return obj[key];
                    }
                }
                return null;
            }

            function loadFromStorage() {
                const savedUser = localStorage.getItem('apgsg_user');
                if (savedUser) {
                    try {
                        currentUser = JSON.parse(savedUser);
                    } catch (e) {
                        localStorage.removeItem('apgsg_user');
                    }
                }
                const savedToken = localStorage.getItem('apgsg_token');
                if (savedToken) {
                    token = savedToken;
                }
                const savedCode = localStorage.getItem('discord_code');
                if (savedCode) {
                    discordCode = savedCode;
                }
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                if (code) {
                    discordCode = code;
                    localStorage.setItem('discord_code', code);
                    window.history.replaceState({}, document.title, window.location.pathname);
                    authorizeWithCode(code);
                }
                updateAuthUI();
            }

            async function authorizeWithCode(code) {
                try {
                    const response = await fetch(`${API.authorize}&oAuth2code=${code}`);
                    if (!response.ok) throw new Error(`Ошибка авторизации: ${response.status}`);
                    const data = await response.json();
                    console.log('Ответ authorize (сырой):', data);

                    const tokenField = extractField(data, ['token', 'accessToken', 'access_token']);
                    const userIdField = extractField(data, ['userID', 'userId', 'id', 'discordId', 'discord_id']);
                    const usernameField = extractField(data, ['username', 'userName', 'name', 'login']);

                    if (tokenField && userIdField) {
                        token = tokenField;
                        currentUser = {
                            id: userIdField,
                            username: usernameField || 'Пользователь',
                            avatar: null
                        };
                        localStorage.setItem('apgsg_token', token);
                        localStorage.setItem('apgsg_user', JSON.stringify(currentUser));
                        localStorage.removeItem('discord_code');
                        discordCode = null;
                        showNotif('✅ Успешный вход', `Привет, ${currentUser.username}!`);
                        updateAuthUI();
                    } else {
                        console.warn('Не удалось найти обязательные поля в ответе:', data);
                        showNotif('❌ Ошибка', 'Некорректный ответ сервера (нет token или userId)');
                    }
                } catch (err) {
                    console.error(err);
                    showNotif('❌ Ошибка', 'Не удалось авторизоваться');
                }
            }

            function login() {
                const url = `https://discord.com/api/oauth2/authorize?client_id=${CONFIG.CLIENT_ID}&redirect_uri=${encodeURIComponent(CONFIG.REDIRECT_URI)}&response_type=code&scope=identify+guilds.join`;
                window.location.href = url;
            }

            function logout() {
                currentUser = null;
                token = null;
                discordCode = null;
                localStorage.removeItem('apgsg_user');
                localStorage.removeItem('apgsg_token');
                localStorage.removeItem('discord_code');
                updateAuthUI();
            }

            function isAdmin() {
                return currentUser && CONFIG.ADMIN_IDS.includes(currentUser.id);
            }

            function isBanned(userId) {
                const banned = localStorage.getItem('banned_users');
                const list = banned ? JSON.parse(banned) : [];
                return list.includes(userId);
            }

            function updateAuthUI() {
                const authSection = document.getElementById('authSection');
                if (currentUser) {
                    authSection.innerHTML = `
                        <div class="user-info" style="display:flex; align-items:center; gap:8px;">
                            <img src="https://cdn.discordapp.com/embed/avatars/0.png" alt="avatar" style="width:28px; height:28px; border-radius:50%;">
                            <span>${escapeHtml(currentUser.username)}</span>
                            <button class="btn-logout" id="logoutBtn" style="background:rgba(255,255,255,0.1); border:1px solid var(--dark-border); color:var(--text-secondary); padding:6px 12px; border-radius:var(--radius-sm); cursor:pointer;">Выйти</button>
                        </div>
                    `;
                    document.getElementById('logoutBtn').addEventListener('click', logout);
                    if (isAdmin()) {
                        const adminLink = document.createElement('a');
                        adminLink.href = '#';
                        adminLink.innerText = 'Админ';
                        adminLink.style.marginLeft = '10px';
                        adminLink.addEventListener('click', (e) => {
                            e.preventDefault();
                            openAdminPanel();
                        });
                        document.querySelector('.user-info').appendChild(adminLink);
                    }
                } else if (discordCode) {
                    authSection.innerHTML = `
                        <div class="user-info" style="display:flex; align-items:center; gap:8px;">
                            <span style="color: var(--accent);">✅ Авторизовано</span>
                            <button class="btn-logout" id="logoutBtn" style="background:rgba(255,255,255,0.1); border:1px solid var(--dark-border); color:var(--text-secondary); padding:6px 12px; border-radius:var(--radius-sm); cursor:pointer;">Выйти</button>
                        </div>
                    `;
                    document.getElementById('logoutBtn').addEventListener('click', logout);
                } else {
                    authSection.innerHTML = `<button class="btn btn-secondary" id="loginBtn"><i class="fab fa-discord"></i> Войти</button>`;
                    document.getElementById('loginBtn').addEventListener('click', login);
                }

                const submitBtn = document.getElementById('submitFeedback');
                const authMsg = document.querySelector('.auth-message');
                if (submitBtn) {
                    if (currentUser && !isBanned(currentUser.id)) {
                        submitBtn.disabled = false;
                        submitBtn.querySelector('i').className = 'fas fa-paper-plane';
                        authMsg.textContent = '';
                        console.log('Кнопка отправки отзыва разблокирована');
                    } else if (currentUser && isBanned(currentUser.id)) {
                        submitBtn.disabled = true;
                        authMsg.textContent = 'Вы забанены и не можете оставлять отзывы.';
                        console.log('Пользователь забанен, кнопка заблокирована');
                    } else {
                        submitBtn.disabled = true;
                        authMsg.textContent = 'Войдите через Discord, чтобы оставить отзыв.';
                        console.log('Пользователь не авторизован, кнопка заблокирована');
                    }
                }
            }

            async function fetchStats() {
                try {
                    const response = await fetch(API.statistics);
                    if (!response.ok) throw new Error(`Ошибка статистики: ${response.status}`);
                    const data = await response.json();
                    console.log('Ответ getStatistics:', data);

                    const online = data.Online || 0;
                    const total = data.Total || 0;
                    const inGame = data.InGame || 0;

                    document.getElementById('totalMembers').textContent = total;
                    document.getElementById('onlineMembers').textContent = online;
                    document.getElementById('gamingMembers').textContent = inGame;
                    document.getElementById('communityTotal').textContent = total;
                    document.getElementById('onlineText').textContent = `${online} участников онлайн`;

                    const activityEl = document.getElementById('serverActivity');
                    if (online > 200) {
                        activityEl.textContent = '🔥 Очень высокая';
                        activityEl.style.background = 'rgba(0,245,212,0.1)';
                        activityEl.style.color = '#00F5D4';
                    } else if (online > 100) {
                        activityEl.textContent = '⚡ Высокая';
                        activityEl.style.background = 'rgba(0,245,212,0.1)';
                        activityEl.style.color = '#00F5D4';
                    } else if (online > 50) {
                        activityEl.textContent = '📊 Средняя';
                        activityEl.style.background = 'rgba(255,200,0,0.1)';
                        activityEl.style.color = '#FFC800';
                    } else {
                        activityEl.textContent = '💤 Низкая';
                        activityEl.style.background = 'rgba(255,0,110,0.1)';
                        activityEl.style.color = '#FF006E';
                    }
                } catch (err) {
                    console.error('Ошибка статистики:', err);
                }
            }

            async function fetchGames() {
                try {
                    const response = await fetch(API.roles);
                    if (!response.ok) throw new Error(`Ошибка загрузки игр: ${response.status}`);
                    const text = await response.text();
                    console.log('Ответ SendRoles (сырой):', text);

                    let games = [];
                    try {
                        const json = JSON.parse(text);
                        if (Array.isArray(json)) {
                            games = json.map(item => ({
                                id: extractField(item, ['id', 'roleId', 'roleID']),
                                name: extractField(item, ['name', 'gameName', 'title']),
                                image: extractField(item, ['image', 'icon', 'img']) || `https://cdn.akamai.steamstatic.com/steam/apps/${getSteamAppId(extractField(item, ['name', 'gameName', 'title']) || '')}/header.jpg`,
                                description: extractField(item, ['description', 'desc']) || `${extractField(item, ['name', 'gameName', 'title'])} — игра на нашем сервере.`
                            })).filter(g => g.id && g.name);
                        } else if (json && typeof json === 'object') {
                            const data = json.data || json.roles || json.games || [];
                            if (Array.isArray(data)) {
                                games = data.map(item => ({
                                    id: extractField(item, ['id', 'roleId', 'roleID']),
                                    name: extractField(item, ['name', 'gameName', 'title']),
                                    image: extractField(item, ['image', 'icon', 'img']) || `https://cdn.akamai.steamstatic.com/steam/apps/${getSteamAppId(extractField(item, ['name', 'gameName', 'title']) || '')}/header.jpg`,
                                    description: extractField(item, ['description', 'desc']) || `${extractField(item, ['name', 'gameName', 'title'])} — игра на нашем сервере.`
                                })).filter(g => g.id && g.name);
                            }
                        }
                    } catch (e) {
                        const lines = text.split('\n').filter(line => line.trim() !== '');
                        games = lines.map(line => {
                            const match = line.match(/^(\d+):\s*(.+)$/);
                            if (match) {
                                return {
                                    id: match[1],
                                    name: match[2].trim(),
                                    image: `https://cdn.akamai.steamstatic.com/steam/apps/${getSteamAppId(match[2])}/header.jpg`,
                                    description: `${match[2].trim()} — игра на нашем сервере.`
                                };
                            }
                            return null;
                        }).filter(g => g !== null);
                    }

                    if (games.length === 0) {
                        console.warn('Не удалось распарсить список игр');
                        showNotif('⚠️ Ошибка', 'Не удалось загрузить список игр');
                    } else {
                        gamesList = games;
                        renderGames(gamesList);
                        document.getElementById('gamesCount').textContent = gamesList.length;
                    }
                } catch (err) {
                    console.error('Ошибка загрузки игр:', err);
                    showNotif('⚠️ Ошибка', 'Не удалось загрузить список игр');
                }
            }

            function getSteamAppId(gameName) {
                const map = {
                    'Doom eternal': '782330',
                    'Terraria': '105600',
                    'Factorio': '427520',
                    'Among Us': '945360',
                    'Barotruma': '363970',
                    'PUBG': '578080',
                    'Brick Rigs': '552100',
                    'War thunder': '236390',
                    'Team Fortress 2': '440',
                    'Raft': '648800',
                    'SCP': '700330',
                    'Minecraft': '1672970',
                    'Space Engineers': '244850',
                    'Lethal company': '1966720',
                    'Garry\'s Mod': '4000',
                    'GTA': '271590',
                    'Scrap Mechanic': '387990',
                    'ASTRONEER': '361420',
                    'Portal 2': '620',
                    'World of Tanks': '1407200',
                    'KSP': '220200',
                    'Battlefield': '1238810',
                    'Don\'t Starve Together': '322330'
                };
                return map[gameName] || '0';
            }

            function renderGames(games) {
                const grid = document.getElementById('gamesGrid');
                grid.innerHTML = '';
                selectedGames.clear();
                updateSelectedCount();
                games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.dataset.game = game.id;

                    const checkbox = document.createElement('div');
                    checkbox.className = 'game-checkbox';
                    checkbox.innerHTML = `
                        <input type="checkbox" id="game-${game.id}" value="${game.id}">
                        <label for="game-${game.id}" class="checkmark">✓</label>
                    `;
                    const input = checkbox.querySelector('input');
                    input.addEventListener('change', (e) => {
                        if (e.target.checked) {
                            selectedGames.add(game.id);
                        } else {
                            selectedGames.delete(game.id);
                        }
                        updateSelectedCount();
                    });

                    card.innerHTML = `
                        <div class="game-thumb">
                            <img src="${game.image}" alt="${game.name}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22300%22%20height%3D%22150%22%3E%3Crect%20width%3D%22300%22%20height%3D%22150%22%20fill%3D%22%23333%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20fill%3D%22%23fff%22%20font-size%3D%2216%22%3E${game.name}%3C%2Ftext%3E%3C%2Fsvg%3E'">
                            <div class="game-thumb-overlay"></div>
                        </div>
                        <div class="game-body"><h4>${game.name}</h4></div>
                    `;
                    card.appendChild(checkbox);

                    card.addEventListener('click', (e) => {
                        if (!e.target.closest('.game-checkbox')) {
                            openGamePopup(game);
                        }
                    });

                    grid.appendChild(card);
                });
            }

            function openGamePopup(game) {
                if (!currentUser && !token && !discordCode) {
                    showNotif('🔒 Требуется вход', 'Сначала авторизуйтесь через Discord');
                    login();
                    return;
                }
                currentGame = game;
                document.getElementById('popupImg').src = game.image || '';
                document.getElementById('popupTitle').textContent = game.name;
                document.getElementById('popupDesc').textContent = game.description;
                document.getElementById('gamePopup').classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function updateSelectedCount() {
                const count = selectedGames.size;
                document.getElementById('selectedCount').textContent = `Выбрано: ${count}`;
                document.getElementById('bulkAssignBtn').disabled = count === 0;
            }

            async function assignSingleRole(roleId) {
                if (!token) {
                    showNotif('🔒 Требуется вход', 'Сначала авторизуйтесь через Discord');
                    return false;
                }
                const url = `${API.addRoles}&roles=${roleId}&token=${token}`;
                const response = await fetch(url);
                const text = await response.text();
                console.log('Ответ addRoles (одиночная):', text);

                if (response.ok) {
                    try {
                        const data = JSON.parse(text);
                        const newToken = extractField(data, ['token', 'accessToken', 'refreshToken']);
                        if (newToken) {
                            token = newToken;
                            localStorage.setItem('apgsg_token', token);
                        }
                    } catch (e) {}
                    return true;
                } else {
                    if (response.status === 400 || response.status === 500 || text.includes('invalid')) {
                        showNotif('❌ Сессия истекла', 'Пожалуйста, войдите заново');
                        logout();
                    } else {
                        const snippet = text.length > 200 ? text.substring(0, 200) + '…' : text;
                        showNotif('❌ Ошибка', `Сервер вернул: ${snippet}`);
                    }
                    return false;
                }
            }

            async function assignMultipleRoles(roleIds) {
                if (!token) {
                    showNotif('❌ Ошибка', 'Нет токена для массовой выдачи');
                    return false;
                }
                const rolesStr = roleIds.join(',');
                const url = `${API.addRoles}&roles=${rolesStr}&token=${token}`;
                const response = await fetch(url);
                const text = await response.text();
                console.log('Ответ addRoles (массовая):', text);

                if (response.ok) {
                    try {
                        const data = JSON.parse(text);
                        const newToken = extractField(data, ['token', 'accessToken', 'refreshToken']);
                        if (newToken) {
                            token = newToken;
                            localStorage.setItem('apgsg_token', token);
                        }
                    } catch (e) {}
                    return true;
                } else {
                    if (response.status === 400 || response.status === 500 || text.includes('invalid')) {
                        showNotif('❌ Сессия истекла', 'Пожалуйста, войдите заново');
                        logout();
                    } else {
                        const snippet = text.length > 200 ? text.substring(0, 200) + '…' : text;
                        showNotif('❌ Ошибка', `Сервер вернул: ${snippet}`);
                    }
                    return false;
                }
            }

            async function assignRoleFromPopup() {
                if (!currentGame) return;
                const btn = document.getElementById('connectToGame');
                const original = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Подключение...';
                btn.disabled = true;

                const success = await assignSingleRole(currentGame.id);
                if (success) {
                    showNotif('✅ Роль выдана!', `Теперь у вас есть роль для ${currentGame.name}. Добро пожаловать!`);
                    document.getElementById('gamePopup').classList.remove('active');
                    document.body.style.overflow = '';
                    updateAuthUI();
                }

                btn.innerHTML = original;
                btn.disabled = false;
            }

            async function bulkAssignRoles() {
                if (selectedGames.size === 0) return;

                if (token) {
                    const btn = document.getElementById('bulkAssignBtn');
                    const original = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Выдача...';
                    btn.disabled = true;

                    const roleIds = Array.from(selectedGames);
                    const success = await assignMultipleRoles(roleIds);
                    if (success) {
                        showNotif('✅ Готово', `Роли успешно выданы (${roleIds.length})`);
                        document.querySelectorAll('.game-checkbox input:checked').forEach(cb => cb.checked = false);
                        selectedGames.clear();
                        updateSelectedCount();
                        updateAuthUI();
                    }

                    btn.innerHTML = original;
                    btn.disabled = false;
                    return;
                }

                if (discordCode) {
                    showNotif('⏳ Ожидание', 'Завершите авторизацию');
                    authorizeWithCode(discordCode);
                    return;
                }

                showNotif('🔒 Требуется вход', 'Сначала авторизуйтесь через Discord');
                login();
            }

            async function fetchReviews() {
                try {
                    let url = API.getReviews;
                    if (token) {
                        url += `&token=${token}`;
                    }
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`Ошибка загрузки отзывов: ${response.status}`);
                    const data = await response.json();
                    console.log('Ответ getReviews (сырой):', data);

                    if (data && data.token) {
                        token = data.token;
                        localStorage.setItem('apgsg_token', token);
                    }

                    let reviewsArray = [];
                    if (Array.isArray(data)) {
                        reviewsArray = data;
                    } else if (data && typeof data === 'object') {
                        reviewsArray = data.reviews || data.comments || data.data || [];
                    }

                    comments = reviewsArray.map((item, index) => {
                        return {
                            id: extractField(item, ['id', 'reviewId', 'commentId']) || index,
                            userId: extractField(item, ['userId', 'userID', 'authorId', 'id']) || 'unknown',
                            userName: extractField(item, ['userName', 'username', 'author', 'name']) || 'Аноним',
                            rating: extractField(item, ['rating', 'score', 'stars']) || 5,
                            comment: extractField(item, ['comment', 'text', 'message', 'content']) || '',
                            date: extractField(item, ['date', 'createdAt', 'timestamp', 'time']) || new Date().toLocaleString(),
                            myRating: extractField(item, ['myRating']) || 'none',
                            banned: false
                        };
                    });
                    renderComments();
                    updateAverageRating();
                } catch (err) {
                    console.error('Ошибка загрузки отзывов:', err);
                    comments = [];
                    renderComments();
                }
            }

            // ИСПРАВЛЕНО: теперь отправка отзыва через GET с параметром comment в URL
            async function submitReview(rating, text) {
                if (!token) {
                    showNotif('🔒 Требуется вход', 'Войдите через Discord');
                    return false;
                }
                try {
                    const encodedComment = encodeURIComponent(text);
                    const url = `${API.sendReview}&token=${token}&rating=${rating}&comment=${encodedComment}`;
                    console.log('Отправка отзыва на URL (GET):', url);
                    const response = await fetch(url); // GET по умолчанию
                    const responseText = await response.text();
                    console.log('Ответ sendReview (GET):', responseText);

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    try {
                        const data = JSON.parse(responseText);
                        const newToken = extractField(data, ['token', 'accessToken', 'refreshToken']);
                        if (newToken) {
                            token = newToken;
                            localStorage.setItem('apgsg_token', token);
                        }
                    } catch (e) {}

                    return true;
                } catch (err) {
                    console.error('Ошибка отправки отзыва:', err);
                    showNotif('❌ Ошибка', 'Не удалось отправить отзыв');
                    return false;
                }
            }

            async function deleteMyReview(reviewId) {
                if (!token) {
                    showNotif('🔒 Требуется вход', 'Войдите через Discord');
                    return false;
                }
                try {
                    const url = `${API.deleteReview}&token=${token}&review=${reviewId}`;
                    const response = await fetch(url);
                    const responseText = await response.text();
                    console.log('Ответ deleteReview:', responseText);

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    try {
                        const data = JSON.parse(responseText);
                        const newToken = extractField(data, ['token', 'accessToken', 'refreshToken']);
                        if (newToken) {
                            token = newToken;
                            localStorage.setItem('apgsg_token', token);
                        }
                    } catch (e) {}

                    return true;
                } catch (err) {
                    console.error('Ошибка удаления отзыва:', err);
                    showNotif('❌ Ошибка', 'Не удалось удалить отзыв');
                    return false;
                }
            }

            async function rateReview(reviewId, ratingValue) {
                if (!token) {
                    showNotif('🔒 Требуется вход', 'Войдите через Discord');
                    return false;
                }
                try {
                    const url = `${API.rateReview}&token=${token}&review=${reviewId}&rating=${ratingValue}`;
                    const response = await fetch(url);
                    const responseText = await response.text();
                    console.log('Ответ rateReview:', responseText);

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    try {
                        const data = JSON.parse(responseText);
                        const newToken = extractField(data, ['token', 'accessToken', 'refreshToken']);
                        if (newToken) {
                            token = newToken;
                            localStorage.setItem('apgsg_token', token);
                        }
                    } catch (e) {}

                    return true;
                } catch (err) {
                    console.error('Ошибка оценки отзыва:', err);
                    showNotif('❌ Ошибка', 'Не удалось оценить отзыв');
                    return false;
                }
            }

            function showNotif(title, text) {
                const n = document.getElementById('notification');
                n.querySelector('h4').textContent = title;
                n.querySelector('p').textContent = text;
                n.classList.add('active');
                setTimeout(() => n.classList.remove('active'), 5000);
            }

            function escapeHtml(unsafe) {
                if (!unsafe) return '';
                return unsafe.replace(/[&<>"]/g, m => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;'
                }[m]));
            }

            function initRatingStars() {
                const stars = document.querySelectorAll('.rating-input .star');
                const ratingValue = document.querySelector('.rating-value');
                stars.forEach(star => {
                    star.addEventListener('click', () => {
                        const value = parseInt(star.dataset.value);
                        ratingValue.textContent = value + '/5';
                        stars.forEach((s, index) => {
                            if (index < value) s.classList.add('active');
                            else s.classList.remove('active');
                        });
                    });
                });
            }

            function resetStars() {
                document.querySelectorAll('.rating-input .star').forEach(s => s.classList.remove('active'));
                document.querySelector('.rating-value').textContent = '0/5';
            }

            function renderComments() {
                const list = document.getElementById('commentsList');
                if (!comments || comments.length === 0) {
                    list.innerHTML = '<p class="loading">Пока нет отзывов. Будьте первым!</p>';
                    return;
                }
                list.innerHTML = comments.map(c => {
                    const canDelete = currentUser && c.userId === currentUser.id;
                    const myRating = c.myRating || 'none';
                    return `
                    <div class="comment-card" data-id="${c.id}" data-userid="${c.userId}">
                        <div class="comment-header">
                            <span class="comment-name">${escapeHtml(c.userName)}</span>
                            <span class="comment-date">${c.date}</span>
                        </div>
                        <div class="comment-rating">${renderStars(c.rating)}</div>
                        <div class="comment-text">${escapeHtml(c.comment)}</div>
                        <div class="comment-actions" style="display:flex; gap:10px; margin-top:8px;">
                            ${canDelete ? `<button class="btn-delete" onclick="deleteComment('${c.id}')">🗑️ Удалить</button>` : ''}
                            <button class="btn-like ${myRating === 'like' ? 'active' : ''}" onclick="rateComment('${c.id}', 'like')">👍</button>
                            <button class="btn-dislike ${myRating === 'dislike' ? 'active' : ''}" onclick="rateComment('${c.id}', 'dislike')">👎</button>
                        </div>
                    </div>
                `}).join('');
            }

            function renderStars(rating) {
                let stars = '';
                for (let i = 1; i <= 5; i++) stars += i <= rating ? '★' : '☆';
                return `<span class="stars">${stars}</span>`;
            }

            function updateAverageRating() {
                if (!comments || comments.length === 0) {
                    document.getElementById('averageRating').textContent = '0.0';
                    return;
                }
                const sum = comments.reduce((acc, c) => acc + c.rating, 0);
                document.getElementById('averageRating').textContent = (sum / comments.length).toFixed(1);
            }

            window.deleteComment = async function(commentId) {
                if (!currentUser) {
                    showNotif('🔒 Требуется вход', 'Войдите через Discord');
                    return;
                }
                const success = await deleteMyReview(commentId);
                if (success) {
                    showNotif('✅ Отзыв удалён', 'Ваш отзыв удалён');
                    await fetchReviews();
                }
            };

            window.rateComment = async function(commentId, ratingValue) {
                if (!currentUser) {
                    showNotif('🔒 Требуется вход', 'Войдите через Discord');
                    return;
                }
                const success = await rateReview(commentId, ratingValue);
                if (success) {
                    showNotif('✅ Оценка сохранена', 'Спасибо за оценку');
                    await fetchReviews();
                }
            };

            function openAdminPanel() {
                if (!isAdmin()) return;
                const panel = document.getElementById('adminPanel');
                panel.classList.add('active');
                updateAdminStats();
                renderAdminComments();
            }

            function updateAdminStats() {
                const total = comments.length;
                document.getElementById('adminTotalReviews').textContent = total;
                const sum = comments.reduce((acc, c) => acc + c.rating, 0);
                const avg = total ? (sum / total).toFixed(1) : '0.0';
                document.getElementById('adminAvgRating').textContent = avg;
                const uniqueUsers = new Set(comments.map(c => c.userId)).size;
                document.getElementById('adminUniqueUsers').textContent = uniqueUsers;
            }

            function renderAdminComments() {
                const list = document.getElementById('adminCommentsList');
                if (!comments || comments.length === 0) {
                    list.innerHTML = '<p style="text-align:center; color:var(--text-muted);">Нет отзывов для модерации</p>';
                    return;
                }
                list.innerHTML = comments.map(c => `
                    <div class="admin-comment-item" data-id="${c.id}">
                        <div class="admin-comment-info">
                            <strong>${escapeHtml(c.userName)}</strong> (ID: ${c.userId})
                            <div class="comment-meta">
                                <span><i class="fas fa-star" style="color:#ffc107;"></i> ${c.rating}/5</span>
                                <span><i class="fas fa-calendar"></i> ${c.date}</span>
                                <span><i class="fas fa-heart" style="color:${c.myRating === 'like' ? '#00F5D4' : 'inherit'}"></i> ${c.myRating}</span>
                            </div>
                            <div style="margin-top:6px;">${escapeHtml(c.comment)}</div>
                        </div>
                        <div class="admin-comment-actions">
                            <button class="delete-btn" onclick="adminDeleteComment('${c.id}')"><i class="fas fa-trash"></i> Удалить</button>
                            <button onclick="adminBanUser('${c.userId}')"><i class="fas fa-ban"></i> Забанить</button>
                        </div>
                    </div>
                `).join('');
            }

            window.adminDeleteComment = async function(commentId) {
                if (!isAdmin()) return;
                const success = await deleteMyReview(commentId);
                if (success) {
                    showNotif('✅ Отзыв удалён', 'Администратор удалил отзыв');
                    await fetchReviews();
                    updateAdminStats();
                    renderAdminComments();
                }
            };

            window.adminBanUser = function(userId) {
                if (!isAdmin()) return;
                const banned = localStorage.getItem('banned_users');
                const list = banned ? JSON.parse(banned) : [];
                if (!list.includes(userId)) {
                    list.push(userId);
                    localStorage.setItem('banned_users', JSON.stringify(list));
                }
                comments = comments.map(c => c.userId === userId ? { ...c, banned: true } : c);
                renderComments();
                updateAverageRating();
                updateAdminStats();
                renderAdminComments();
                showNotif('✅ Пользователь забанен', 'Его комментарии скрыты из общего списка');
            };

            document.getElementById('closeAdmin').addEventListener('click', () => {
                document.getElementById('adminPanel').classList.remove('active');
            });

            document.getElementById('refreshAdmin').addEventListener('click', async () => {
                await fetchReviews();
                updateAdminStats();
                renderAdminComments();
                showNotif('🔄 Обновлено', 'Данные админ-панели обновлены');
            });

            function initGameSearch() {
                document.getElementById('gameSearch').addEventListener('input', function(e) {
                    const q = e.target.value.toLowerCase();
                    document.querySelectorAll('.game-card').forEach(card => {
                        const name = card.querySelector('h4').textContent.toLowerCase();
                        card.style.display = name.includes(q) ? '' : 'none';
                    });
                });
            }

            function initRandomTeam() {
                document.getElementById('randomTeamBtn').addEventListener('click', function() {
                    const cards = document.querySelectorAll('.game-card');
                    if (cards.length) cards[Math.floor(Math.random() * cards.length)].click();
                });
            }

            function initMobileMenu() {
                const toggle = document.getElementById('mobileToggle');
                const nav = document.getElementById('navLinks');
                toggle.addEventListener('click', () => {
                    nav.classList.toggle('active');
                    toggle.innerHTML = nav.classList.contains('active') ? '<i class="fas fa-times"></i>' : '<i class="fas fa-bars"></i>';
                });
                document.querySelectorAll('.nav-links a').forEach(link => {
                    link.addEventListener('click', () => {
                        nav.classList.remove('active');
                        toggle.innerHTML = '<i class="fas fa-bars"></i>';
                    });
                });
                window.addEventListener('resize', () => {
                    if (window.innerWidth > 1024) {
                        nav.classList.remove('active');
                        toggle.innerHTML = '<i class="fas fa-bars"></i>';
                    }
                });
            }

            function initHeader() {
                window.addEventListener('scroll', () => {
                    document.getElementById('header').classList.toggle('scrolled', window.scrollY > 40);
                });
            }

            function initTheme() {
                const btn = document.getElementById('themeToggle');
                if (localStorage.getItem('theme') === 'light') {
                    document.body.classList.add('theme-light');
                    btn.innerHTML = '<i class="fas fa-sun"></i>';
                }
                btn.addEventListener('click', () => {
                    document.body.classList.toggle('theme-light');
                    btn.innerHTML = document.body.classList.contains('theme-light') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
                    localStorage.setItem('theme', document.body.classList.contains('theme-light') ? 'light' : 'dark');
                });
            }

            function initScrollAnimations() {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) entry.target.classList.add('visible');
                    });
                }, { threshold: 0.1 });
                document.querySelectorAll('.fade-up, .stagger').forEach(el => observer.observe(el));
            }

            function initNotification() {
                const n = document.getElementById('notification');
                setTimeout(() => n.classList.add('active'), 2000);
                setTimeout(() => n.classList.remove('active'), 8000);
                n.addEventListener('click', () => n.classList.remove('active'));
            }

            function initScrollTop() {
                const btn = document.getElementById('scrollTop');
                window.addEventListener('scroll', () => btn.classList.toggle('visible', window.pageYOffset > 400));
                btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
            }

            function initSmoothScroll() {
                document.querySelectorAll('a[href^="#"]').forEach(link => {
                    link.addEventListener('click', e => {
                        e.preventDefault();
                        const target = document.querySelector(link.getAttribute('href'));
                        if (target) target.scrollIntoView({ behavior: 'smooth' });
                    });
                });
            }

            function initInfoTabs() {
                const tabs = document.querySelectorAll('.info-tab');
                const sections = document.querySelectorAll('.info-section');
                tabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        const id = tab.dataset.tab;
                        tabs.forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        sections.forEach(s => {
                            s.classList.remove('active');
                            if (s.id === id + '-content') s.classList.add('active');
                        });
                    });
                });
                document.querySelectorAll('.footer-col a[data-tab]').forEach(link => {
                    link.addEventListener('click', e => {
                        e.preventDefault();
                        document.getElementById('info').scrollIntoView({ behavior: 'smooth' });
                        setTimeout(() => {
                            const tab = document.querySelector(`.info-tab[data-tab="${link.dataset.tab}"]`);
                            if (tab) tab.click();
                        }, 600);
                    });
                });
            }

            function addRefreshButton() {
                const header = document.querySelector('#games .section-header');
                const btn = document.createElement('button');
                btn.className = 'btn btn-secondary';
                btn.style.marginTop = '10px';
                btn.innerHTML = '<i class="fas fa-sync-alt"></i> Обновить игры';
                btn.addEventListener('click', async () => {
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Обновление...';
                    await fetchGames();
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sync-alt"></i> Обновить игры';
                });
                header.appendChild(btn);
            }

            // Обработчик отправки отзыва
            document.getElementById('submitFeedback').addEventListener('click', async function(e) {
                e.preventDefault();
                console.log('Кнопка отправки отзыва нажата');
                if (!currentUser) {
                    showNotif('🔒 Требуется вход', 'Войдите через Discord');
                    login();
                    return;
                }
                const rating = parseInt(document.querySelector('.rating-value').textContent);
                if (rating < 1 || rating > 5) {
                    alert('Поставьте оценку от 1 до 5');
                    return;
                }
                const text = document.getElementById('feedback-message').value.trim();
                if (!text) {
                    alert('Напишите комментарий');
                    return;
                }
                if (isBanned(currentUser.id)) {
                    showNotif('⛔ Вы забанены', 'Вы не можете оставлять отзывы');
                    return;
                }
                if (!token) {
                    showNotif('🔒 Ошибка', 'Токен отсутствует, перезайдите');
                    logout();
                    return;
                }
                const success = await submitReview(rating, text);
                if (success) {
                    showNotif('✅ Спасибо!', 'Ваш отзыв добавлен');
                    document.getElementById('feedback-message').value = '';
                    resetStars();
                    await fetchReviews();
                }
            });

            window.addEventListener('load', function() {
                initHeader();
                initMobileMenu();
                initTheme();
                initScrollAnimations();
                initNotification();
                initScrollTop();
                initSmoothScroll();
                initInfoTabs();
                initGameSearch();
                initRandomTeam();
                initRatingStars();
                loadFromStorage();
                fetchStats();
                fetchGames();
                fetchReviews();
                addRefreshButton();
                setInterval(fetchStats, 30000);

                // Устанавливаем динамическую версию в админке (меняется при каждой загрузке страницы)
                const versionEl = document.querySelector('.admin-version');
                if (versionEl) {
                    const now = new Date();
                    const version = `2.5.${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}.${now.getHours().toString().padStart(2,'0')}${now.getMinutes().toString().padStart(2,'0')}`;
                    versionEl.innerHTML = `<i class="fas fa-code-branch"></i> Версия ${version}`;
                }

                document.getElementById('connectToGame').addEventListener('click', assignRoleFromPopup);
                document.getElementById('bulkAssignBtn').addEventListener('click', bulkAssignRoles);
                document.getElementById('popupClose').addEventListener('click', () => {
                    document.getElementById('gamePopup').classList.remove('active');
                    document.body.style.overflow = '';
                });
                document.getElementById('gamePopup').addEventListener('click', (e) => {
                    if (e.target === document.getElementById('gamePopup')) {
                        document.getElementById('gamePopup').classList.remove('active');
                        document.body.style.overflow = '';
                    }
                });

                document.querySelector('.footer-bottom p').innerHTML =
                    `&copy; ${new Date().getFullYear()} APGsG Gaming Community. Все права защищены.`;
            });
        })();
    </script>
</body>
</html>
