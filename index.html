        let currentUser = null;
        let currentGame = null;
        let comments = [];
        let discordCode = null;

        // Загрузка из localStorage
        function loadUserFromStorage() {
            const savedUser = localStorage.getItem('apgsg_user');
            if (savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                } catch (e) {
                    localStorage.removeItem('apgsg_user');
                }
            }
            const savedCode = localStorage.getItem('discord_code');
            if (savedCode) {
                discordCode = savedCode;
            }
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code) {
                discordCode = code;
                localStorage.setItem('discord_code', code);
                window.history.replaceState({}, document.title, window.location.pathname);
                // Попытка получить данные пользователя (если бэкенд поддерживает)
                fetchUserData(code);
            }
            updateAuthUI();
        }

        // Получение данных пользователя (заглушка, можно реализовать позже)
        async function fetchUserData(code) {
            // Если у бэкенда есть эндпоинт для получения данных по коду, добавьте сюда
            // Например: /getUser?code=...
            console.log('Получен код, можно запросить данные пользователя:', code);
        }

        function login() {
            const url = `https://discord.com/api/oauth2/authorize?client_id=${CONFIG.CLIENT_ID}&redirect_uri=${encodeURIComponent(CONFIG.REDIRECT_URI)}&response_type=code&scope=identify+guilds.join`;
            window.location.href = url;
        }

        function logout() {
            currentUser = null;
            discordCode = null;
            localStorage.removeItem('apgsg_user');
            localStorage.removeItem('discord_code');
            updateAuthUI();
        }

        function isAdmin() {
            return currentUser && CONFIG.ADMIN_IDS.includes(currentUser.id);
        }

        function isBanned(userId) {
            const banned = localStorage.getItem('banned_users');
            const list = banned ? JSON.parse(banned) : [];
            return list.includes(userId);
        }

        function updateAuthUI() {
            const authSection = document.getElementById('authSection');
            if (currentUser) {
                authSection.innerHTML = `
                    <div class="user-info" style="display:flex; align-items:center; gap:8px;">
                        <img src="https://cdn.discordapp.com/avatars/${currentUser.id}/${currentUser.avatar}.png" alt="avatar" style="width:28px; height:28px; border-radius:50%;" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
                        <span>${currentUser.username}</span>
                        <button class="btn-logout" id="logoutBtn" style="background:rgba(255,255,255,0.1); border:1px solid var(--dark-border); color:var(--text-secondary); padding:6px 12px; border-radius:var(--radius-sm); cursor:pointer;">Выйти</button>
                    </div>
                `;
                document.getElementById('logoutBtn').addEventListener('click', logout);
                if (isAdmin()) {
                    const adminLink = document.createElement('a');
                    adminLink.href = '#';
                    adminLink.innerText = 'Админ';
                    adminLink.style.marginLeft = '10px';
                    adminLink.addEventListener('click', (e) => {
                        e.preventDefault();
                        openAdminPanel();
                    });
                    document.querySelector('.user-info').appendChild(adminLink);
                }
            } else if (discordCode) {
                authSection.innerHTML = `
                    <div class="user-info" style="display:flex; align-items:center; gap:8px;">
                        <span style="color: var(--accent);">✅ Авторизовано</span>
                        <button class="btn-logout" id="logoutBtn" style="background:rgba(255,255,255,0.1); border:1px solid var(--dark-border); color:var(--text-secondary); padding:6px 12px; border-radius:var(--radius-sm); cursor:pointer;">Выйти</button>
                    </div>
                `;
                document.getElementById('logoutBtn').addEventListener('click', logout);
            } else {
                authSection.innerHTML = `<button class="btn btn-secondary" id="loginBtn"><i class="fab fa-discord"></i> Войти</button>`;
                document.getElementById('loginBtn').addEventListener('click', login);
            }

            const submitBtn = document.getElementById('submitFeedback');
            const authMsg = document.querySelector('.auth-message');
            if (submitBtn) {
                if (currentUser && !isBanned(currentUser.id)) {
                    submitBtn.disabled = false;
                    submitBtn.querySelector('i').className = 'fas fa-paper-plane';
                    authMsg.textContent = '';
                } else if (currentUser && isBanned(currentUser.id)) {
                    submitBtn.disabled = true;
                    authMsg.textContent = 'Вы забанены и не можете оставлять отзывы.';
                } else {
                    submitBtn.disabled = true;
                    authMsg.textContent = 'Войдите через Discord, чтобы оставить отзыв.';
                }
            }
        }

        // --- Звёзды рейтинга ---
        function initRatingStars() {
            const stars = document.querySelectorAll('.rating-input .star');
            const ratingValue = document.querySelector('.rating-value');
            stars.forEach(star => {
                star.addEventListener('click', () => {
                    const value = parseInt(star.dataset.value);
                    ratingValue.textContent = value + '/5';
                    stars.forEach((s, index) => {
                        if (index < value) s.classList.add('active');
                        else s.classList.remove('active');
                    });
                });
            });
        }

        function resetStars() {
            document.querySelectorAll('.rating-input .star').forEach(s => s.classList.remove('active'));
            document.querySelector('.rating-value').textContent = '0/5';
        }

        // --- Комментарии (локальное хранилище) ---
        function loadComments() {
            const saved = localStorage.getItem('apgsg_comments');
            comments = saved ? JSON.parse(saved) : [
                { id: '1', userId: 'admin', userName: 'Игрок123', rating: 5, comment: 'Отличный сервер!', date: '2025-03-14 15:30', banned: false },
                { id: '2', userId: 'user2', userName: 'DotaFan', rating: 4, comment: 'Ребята отзывчивые.', date: '2025-03-13 10:15', banned: false },
            ];
            renderComments();
            updateAverageRating();
        }

        function renderComments() {
            const list = document.getElementById('commentsList');
            const filtered = comments.filter(c => !c.banned);
            if (filtered.length === 0) {
                list.innerHTML = '<p class="loading">Пока нет отзывов. Будьте первым!</p>';
                return;
            }
            list.innerHTML = filtered.map(c => `
                <div class="comment-card" data-id="${c.id}">
                    <div class="comment-header">
                        <span class="comment-name">${escapeHtml(c.userName)}</span>
                        <span class="comment-date">${c.date}</span>
                    </div>
                    <div class="comment-rating">${renderStars(c.rating)}</div>
                    <div class="comment-text">${escapeHtml(c.comment)}</div>
                    ${isAdmin() ? `
                        <div class="admin-actions">
                            <button class="btn-delete" onclick="deleteComment('${c.id}')">🗑️ Удалить</button>
                            <button class="btn-ban" onclick="banUser('${c.userId}')">🔨 Забанить</button>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function renderStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                stars += i <= rating ? '★' : '☆';
            }
            return `<span class="stars">${stars}</span>`;
        }

        function updateAverageRating() {
            const valid = comments.filter(c => !c.banned);
            if (valid.length === 0) {
                document.getElementById('averageRating').textContent = '0.0';
                return;
            }
            const sum = valid.reduce((acc, c) => acc + c.rating, 0);
            const avg = (sum / valid.length).toFixed(1);
            document.getElementById('averageRating').textContent = avg;
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe.replace(/[&<>"]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }

        document.getElementById('submitFeedback').addEventListener('click', async function(e) {
            e.preventDefault();
            if (!currentUser) {
                showNotif('🔒 Требуется вход', 'Войдите через Discord');
                login();
                return;
            }
            const rating = parseInt(document.querySelector('.rating-value').textContent);
            if (rating < 1 || rating > 5) {
                alert('Поставьте оценку от 1 до 5');
                return;
            }
            const text = document.getElementById('feedback-message').value.trim();
            if (!text) {
                alert('Напишите комментарий');
                return;
            }
            if (isBanned(currentUser.id)) {
                showNotif('⛔ Вы забанены', 'Вы не можете оставлять отзывы');
                return;
            }
            const newComment = {
                id: Date.now().toString(),
                userId: currentUser.id,
                userName: currentUser.username,
                rating: rating,
                comment: text,
                date: new Date().toLocaleString('ru-RU', { hour12: false }),
                banned: false
            };
            comments.unshift(newComment);
            if (comments.length > 50) comments.pop();
            localStorage.setItem('apgsg_comments', JSON.stringify(comments));
            renderComments();
            updateAverageRating();
            document.getElementById('feedback-message').value = '';
            resetStars();
            showNotif('✅ Спасибо!', 'Ваш отзыв добавлен');
            try {
                await fetch(CONFIG.FEEDBACK_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `**Новый отзыв**\n**Оценка:** ${rating}/5\n**От:** ${currentUser.username}\n**Сообщение:** ${text}`
                    })
                });
            } catch (err) {
                console.warn('Не удалось отправить в вебхук', err);
            }
        });

        window.deleteComment = function(commentId) {
            if (!isAdmin()) return;
            comments = comments.filter(c => c.id !== commentId);
            localStorage.setItem('apgsg_comments', JSON.stringify(comments));
            renderComments();
            updateAverageRating();
        };

        window.banUser = function(userId) {
            if (!isAdmin()) return;
            const banned = localStorage.getItem('banned_users');
            const list = banned ? JSON.parse(banned) : [];
            if (!list.includes(userId)) {
                list.push(userId);
                localStorage.setItem('banned_users', JSON.stringify(list));
            }
            comments = comments.map(c => c.userId === userId ? {...c, banned: true} : c);
            localStorage.setItem('apgsg_comments', JSON.stringify(comments));
            renderComments();
            updateAverageRating();
            showNotif('✅ Пользователь забанен', 'Его комментарии скрыты');
        };

        function openAdminPanel() {
            if (!isAdmin()) return;
            const panel = document.getElementById('adminPanel');
            const list = document.getElementById('adminCommentsList');
            list.innerHTML = comments.map(c => `
                <div class="admin-comment-item">
                    <strong>${escapeHtml(c.userName)}</strong> (${c.userId})<br>
                    Оценка: ${c.rating}/5<br>
                    ${escapeHtml(c.comment)}<br>
                    <button onclick="deleteComment('${c.id}')">Удалить</button>
                    <button onclick="banUser('${c.userId}')">Забанить</button>
                </div>
            `).join('');
            panel.style.display = 'flex';
        }

        document.getElementById('closeAdmin').addEventListener('click', () => {
            document.getElementById('adminPanel').style.display = 'none';
        });

        // --- Загрузка игр ---
        function loadGames() {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = '';
            GAMES.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.dataset.game = game.id;
                card.innerHTML = `
                    <div class="game-thumb">
                        <img src="${game.image}" alt="${game.name}" onerror="this.src='https://via.placeholder.com/300x150?text=${encodeURIComponent(game.name)}'">
                        <div class="game-thumb-overlay"></div>
                    </div>
                    <div class="game-body"><h4>${game.name}</h4></div>
                `;
                card.addEventListener('click', () => openGamePopup(game));
                grid.appendChild(card);
            });
            document.getElementById('gamesCount').textContent = GAMES.length;
        }

        function openGamePopup(game) {
            if (!currentUser && !discordCode) {
                showNotif('🔒 Требуется вход', 'Сначала авторизуйтесь через Discord');
                login();
                return;
            }
            currentGame = game;
            document.getElementById('popupImg').src = game.image;
            document.getElementById('popupTitle').textContent = game.name;
            document.getElementById('popupDesc').textContent = game.description;
            document.getElementById('gamePopup').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // --- ВЫДАЧА РОЛИ (исправленная версия с диагностикой) ---
        document.getElementById('connectToGame').addEventListener('click', async function() {
            if (!currentGame) return;

            // Приоритет: используем код, если он есть, иначе пытаемся использовать данные пользователя (но без кода нельзя)
            let codeToUse = discordCode;
            if (!codeToUse) {
                showNotif('🔒 Требуется вход', 'Сначала авторизуйтесь через Discord');
                login();
                return;
            }

            const btn = this;
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Подключение...';
            btn.disabled = true;

            try {
                const roleId = currentGame.id; // ID роли
                const url = `${CONFIG.API_BASE_URL}/MARAZMUS?question=addRole&role=${roleId}&oAuth2code=${codeToUse}`;
                
                console.log('Отправка запроса на URL:', url); // Для отладки
                
                const response = await fetch(url);
                const text = await response.text();
                
                console.log('Ответ сервера:', text); // Для отладки
                
                // Проверяем, содержит ли ответ ожидаемую строку (игнорируем пробелы и регистр)
                if (text.trim().toLowerCase().includes('request acknowledged')) {
                    showNotif('✅ Роль выдана!', `Теперь у вас есть роль для ${currentGame.name}. Добро пожаловать!`);
                    document.getElementById('gamePopup').classList.remove('active');
                    document.body.style.overflow = '';
                    
                    // Очищаем код, так как он использован
                    localStorage.removeItem('discord_code');
                    discordCode = null;
                    
                    // Если хотите, можете запросить данные пользователя здесь
                    // Например: fetchUserData(codeToUse);
                } else {
                    // Если ответ не содержит ожидаемой строки, показываем его в уведомлении для диагностики
                    showNotif('❌ Ошибка', `Сервер вернул: ${text.substring(0, 100)}`);
                }
            } catch (err) {
                console.error('Ошибка при запросе:', err);
                showNotif('❌ Ошибка', 'Не удалось连接到 сервер. Проверьте консоль.');
            } finally {
                btn.innerHTML = original;
                btn.disabled = false;
            }
        });

        function showNotif(title, text) {
            const n = document.getElementById('notification');
            n.querySelector('h4').textContent = title;
            n.querySelector('p').textContent = text;
            n.classList.add('active');
            setTimeout(() => n.classList.remove('active'), 5000);
        }

        // --- Поиск игр ---
        function initGameSearch() {
            document.getElementById('gameSearch').addEventListener('input', function(e) {
                const q = e.target.value.toLowerCase();
                document.querySelectorAll('.game-card').forEach(card => {
                    const name = card.querySelector('h4').textContent.toLowerCase();
                    card.style.display = name.includes(q) ? '' : 'none';
                });
            });
        }

        // --- Случайная игра ---
        function initRandomTeam() {
            document.getElementById('randomTeamBtn').addEventListener('click', function() {
                const cards = document.querySelectorAll('.game-card');
                if (cards.length) cards[Math.floor(Math.random() * cards.length)].click();
            });
        }

        // --- Мобильное меню ---
        function initMobileMenu() {
            const toggle = document.getElementById('mobileToggle');
            const nav = document.getElementById('navLinks');
            toggle.addEventListener('click', () => {
                nav.classList.toggle('active');
                toggle.innerHTML = nav.classList.contains('active') ? '<i class="fas fa-times"></i>' : '<i class="fas fa-bars"></i>';
            });
            document.querySelectorAll('.nav-links a').forEach(link => {
                link.addEventListener('click', () => {
                    nav.classList.remove('active');
                    toggle.innerHTML = '<i class="fas fa-bars"></i>';
                });
            });
            window.addEventListener('resize', () => {
                if (window.innerWidth > 1024) {
                    nav.classList.remove('active');
                    toggle.innerHTML = '<i class="fas fa-bars"></i>';
                }
            });
        }

        function initHeader() {
            window.addEventListener('scroll', () => {
                document.getElementById('header').classList.toggle('scrolled', window.scrollY > 40);
            });
        }

        function initTheme() {
            const btn = document.getElementById('themeToggle');
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('theme-light');
                btn.innerHTML = '<i class="fas fa-sun"></i>';
            }
            btn.addEventListener('click', () => {
                document.body.classList.toggle('theme-light');
                const isLight = document.body.classList.contains('theme-light');
                btn.innerHTML = isLight ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
            });
        }

        function initScrollAnimations() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('visible');
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.fade-up, .stagger').forEach(el => observer.observe(el));
        }

        function initNotification() {
            const n = document.getElementById('notification');
            setTimeout(() => n.classList.add('active'), 2000);
            setTimeout(() => n.classList.remove('active'), 8000);
            n.addEventListener('click', () => n.classList.remove('active'));
        }

        function initScrollTop() {
            const btn = document.getElementById('scrollTop');
            window.addEventListener('scroll', () => btn.classList.toggle('visible', window.pageYOffset > 400));
            btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        }

        function initSmoothScroll() {
            document.querySelectorAll('a[href^="#"]').forEach(link => {
                link.addEventListener('click', e => {
                    e.preventDefault();
                    const target = document.querySelector(link.getAttribute('href'));
                    if (target) target.scrollIntoView({ behavior: 'smooth' });
                });
            });
        }

        function initInfoTabs() {
            const tabs = document.querySelectorAll('.info-tab');
            const sections = document.querySelectorAll('.info-section');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const id = tab.dataset.tab;
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    sections.forEach(s => {
                        s.classList.remove('active');
                        if (s.id === id + '-content') s.classList.add('active');
                    });
                });
            });
            document.querySelectorAll('.footer-col a[data-tab]').forEach(link => {
                link.addEventListener('click', e => {
                    e.preventDefault();
                    document.getElementById('info').scrollIntoView({ behavior: 'smooth' });
                    setTimeout(() => {
                        const tab = document.querySelector(`.info-tab[data-tab="${link.dataset.tab}"]`);
                        if (tab) tab.click();
                    }, 600);
                });
            });
        }

        // --- Запуск ---
        window.addEventListener('load', function() {
            initHeader();
            initMobileMenu();
            initTheme();
            initScrollAnimations();
            initNotification();
            initScrollTop();
            initSmoothScroll();
            initInfoTabs();
            initGameSearch();
            initRandomTeam();
            initRatingStars();
            loadComments();
            loadUserFromStorage();
            loadGames();

            document.getElementById('popupClose').addEventListener('click', () => {
                document.getElementById('gamePopup').classList.remove('active');
                document.body.style.overflow = '';
            });
            document.getElementById('gamePopup').addEventListener('click', (e) => {
                if (e.target === document.getElementById('gamePopup')) {
                    document.getElementById('gamePopup').classList.remove('active');
                    document.body.style.overflow = '';
                }
            });

            document.querySelector('.footer-bottom p').innerHTML = 
                `&copy; ${new Date().getFullYear()} APGsG Gaming Community. Все права защищены.`;
        });
    </script>
</body>
</html>
